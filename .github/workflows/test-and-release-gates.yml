name: Tests And Release Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Install test tooling
        run: poetry run python -m pip install pytest pytest-cov

      - name: Run unit tests with coverage
        run: >
          poetry run pytest tests/unit -m unit
          --cov=fit_scraper --cov=main
          --cov-report=term-missing
          --cov-fail-under=80

  integration-tests:
    name: Integration smoke tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Install test tooling
        run: poetry run python -m pip install pytest

      - name: Run integration smoke tests
        run: xvfb-run -a poetry run pytest tests/integration -m integration -q

  contract-tests:
    name: Contract tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Install test tooling
        run: poetry run python -m pip install pytest

      - name: Run contract tests
        run: poetry run pytest tests/contract -m contract -q

  e2e-tests:
    name: E2E smoke tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Install project dependencies
        run: poetry install --no-interaction

      - name: Install test tooling
        run: poetry run python -m pip install pytest

      - name: Run e2e smoke tests
        run: xvfb-run -a poetry run pytest tests/e2e -m e2e -q

  package-check:
    name: Package checks
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, contract-tests, e2e-tests]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry twine

      - name: Validate pyproject metadata
        run: poetry check

      - name: Build package
        run: poetry build

      - name: Validate built artifacts
        run: twine check dist/*
